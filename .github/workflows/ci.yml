name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build-image.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (without push)
        id: build-image
        run: |
          TAG="${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }}"
          docker build -t $TAG .
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Upload image as artifact (optional, for test job)
        run: |
          docker save -o /tmp/image.tar ${{ steps.build-image.outputs.tag }}
          # Note: we won't upload the full image because it's large; instead we'll build again in test job, or use caching.
          # Simpler: let's just build in test job too, but we can reuse layers with cache.
          # We'll use Docker layer caching for speed.

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing (with cache)
        uses: docker/build-push-action@v5
        with:
          load: true   # load into Docker daemon
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run health check test
        run: |
          docker run -d --name test-cicd -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:test
          sleep 3
          if ! curl -s http://localhost:8000/health | grep -q OK; then
            echo "Test failed"
            docker logs test-cicd
            exit 1
          fi
          echo "Test passed"
          docker stop test-cicd && docker rm test-cicd

  push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push final image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=maxt
